name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Midnight Compact Compiler
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
          echo "$HOME/.compact/bin" >> $GITHUB_PATH

      - name: Update Compiler
        run: compact update

      - name: Compile Contracts
        run: |
          mkdir -p frontend/src/lib/managed
          compact compile contracts/age_verifier.compact frontend/src/lib/managed/

      - name: Run tests
        run: |
          cd frontend
          npm test

      - name: Commit Compiled Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/src/lib/managed/
          git commit -m "Auto-compile Midnight contracts [skip ci]" || echo "No changes to commit"
          git push
